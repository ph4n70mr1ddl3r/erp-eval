<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuildRight Depot — ERP Vendor Comparison</title>
<style>
:root{
  --oracle:#c74634;--oracle-l:#fdeae8;
  --msft:#0078d4;--msft-l:#e6f4ff;
  --sap:#0faaff;--sap-l:#e6f5ff;
  --bg:#f5f6f8;--card:#fff;--text:#1a1a2e;--text2:#666;
  --border:#e2e5ea;--accent:#4f46e5;--accent-l:#eef2ff;
  --green:#16a34a;--amber:#d97706;--red:#dc2626;
  --sh:0 1px 3px rgba(0,0,0,.08);--sh2:0 4px 14px rgba(0,0,0,.1);
  --r:10px;--nav-w:270px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.65;overflow-x:hidden}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;width:var(--nav-w);height:100vh;background:#1a1a2e;color:#c5c8d8;z-index:1000;overflow-y:auto;overflow-x:hidden;transition:transform .3s}
.sidebar.closed{transform:translateX(-100%)}
.sidebar .logo{padding:18px 16px 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#8b8fa3}
.sidebar .logo b{display:block;font-size:17px;letter-spacing:0;color:#fff;margin:2px 0}
.sidebar .logo small{font-size:10px;color:#8b8fa3;font-weight:400}

/* NAV SECTIONS */
.nav-section{padding:10px 0 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#6b7094;margin:0 16px;border-top:1px solid #2a2a42}
.nav-section:first-child{border-top:none;margin-top:4px}
.sidebar nav a{display:flex;align-items:center;gap:8px;padding:7px 16px 7px 28px;color:#a0a4b8;text-decoration:none;font-size:13px;font-weight:500;border-left:3px solid transparent;transition:.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar nav a:hover,.sidebar nav a.active{background:rgba(255,255,255,.06);color:#fff;border-left-color:var(--accent)}
.sidebar nav a .ic{width:16px;text-align:center;flex-shrink:0;font-size:13px}
.sidebar nav a.parent-link{padding-left:16px;font-weight:600;color:#d0d3e0}
.sidebar nav a.child-link{font-size:12px;padding-left:36px}
.sidebar nav a.child-link::before{content:'·';margin-right:4px;color:#555}

/* HAMBURGER */
.hamburger{display:none;position:fixed;top:10px;left:10px;z-index:1100;width:40px;height:40px;border-radius:var(--r);border:none;background:#1a1a2e;color:#fff;font-size:20px;cursor:pointer;box-shadow:var(--sh2)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999}

/* MAIN */
.main{margin-left:var(--nav-w);padding:28px;min-height:100vh}
.page{display:none;animation:fadeIn .25s}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* CARDS */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:22px;margin-bottom:18px;border:1px solid var(--border)}
.card h2{font-size:19px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border)}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--sh);border:1px solid var(--border);text-align:center}
.kpi .label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);margin-bottom:4px}
.kpi .value{font-size:24px;font-weight:800}
.kpi .sub{font-size:11px;color:var(--text2);margin-top:2px}

/* TABLES */
.table-wrap{overflow-x:auto;margin:0 -4px;padding:0 4px;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
th{background:#1a1a2e;color:#fff;font-weight:600;text-align:left;padding:10px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.3px;position:sticky;top:0;z-index:1}
td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top}
tr:hover td{background:#f7f8fc}
th.o,td.o{border-left:3px solid var(--oracle)}
th.m,td.m{border-left:3px solid var(--msft)}
th.s,td.s{border-left:3px solid var(--sap)}
.cat td{background:var(--accent-l);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.3px}

/* STARS & RISK */
.stars{color:#f59e0b;letter-spacing:1px}
.risk-l{display:inline-block;background:#dcfce7;color:var(--green);padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.risk-m{display:inline-block;background:#fef3c7;color:var(--amber);padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.risk-h{display:inline-block;background:#fee2e2;color:var(--red);padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}

/* VENDOR CARDS */
.vc{border-radius:var(--r);padding:20px;box-shadow:var(--sh);border:2px solid transparent}
.vc.oracle{background:var(--oracle-l);border-color:var(--oracle)}
.vc.msft{background:var(--msft-l);border-color:var(--msft)}
.vc.sap{background:var(--sap-l);border-color:var(--sap)}
.vc h3{margin:0 0 6px;font-size:16px}
.vc .tag{display:inline-block;padding:2px 10px;border-radius:6px;font-size:10px;font-weight:700;color:#fff;margin-bottom:8px}
.vc.oracle .tag{background:var(--oracle)}.vc.msft .tag{background:var(--msft)}.vc.sap .tag{background:var(--sap)}
.vc ul{list-style:none;font-size:13px}.vc li{padding:2px 0}.vc li::before{content:'→ ';font-weight:700}

/* BAR CHARTS */
.bar-row{display:flex;align-items:center;margin-bottom:6px;gap:8px}
.bar-label{width:80px;font-size:11px;font-weight:600;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:22px;background:#e5e7eb;border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:8px;color:#fff;font-size:10px;font-weight:700}
.bar-fill.o{background:var(--oracle)}.bar-fill.m{background:var(--msft)}.bar-fill.s{background:var(--sap)}

/* RENDERED MD CONTENT */
.md-content h1{font-size:24px;margin:20px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.md-content h2{font-size:20px;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.md-content h3{font-size:17px;margin:16px 0 8px;color:var(--text2)}
.md-content h4{font-size:15px;margin:14px 0 6px;color:var(--text2)}
.md-content p{margin:8px 0}
.md-content ul,.md-content ol{margin:8px 0 8px 20px}
.md-content li{margin:3px 0}
.md-content blockquote{border-left:4px solid var(--accent);background:var(--accent-l);padding:10px 16px;margin:12px 0;border-radius:0 var(--r) var(--r) 0;font-size:14px}
.md-content pre{background:#1a1a2e;color:#e0e0e0;padding:16px;border-radius:var(--r);overflow-x:auto;margin:12px 0;font-size:13px}
.md-content code{background:#f0f1f3;padding:2px 6px;border-radius:4px;font-size:12px}
.md-content pre code{background:none;padding:0}
.md-content hr{border:none;border-top:1px solid var(--border);margin:20px 0}
.md-content table{margin:12px 0}
.md-content strong{color:var(--text)}
.md-content em{color:var(--text2)}
.md-content img{max-width:100%;border-radius:var(--r)}

/* SECTION TITLE */
.stitle{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid var(--border)}
.stitle .ic{font-size:22px}.stitle h2{font-size:20px;margin:0;border:none;padding:0}

/* BACK BTN */
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;background:var(--accent-l);color:var(--accent);text-decoration:none;font-size:13px;font-weight:600;margin-bottom:14px;cursor:pointer;border:none;cursor:pointer}
.back-btn:hover{background:var(--accent);color:#fff}

/* FOOTER */
.footer{text-align:center;padding:24px 16px;color:var(--text2);font-size:11px;margin-top:30px;border-top:1px solid var(--border)}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .hamburger{display:flex;align-items:center;justify-content:center}
  .overlay.show{display:block}
  .main{margin-left:0;padding:56px 12px 16px}
  .kpi-row{grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}
  .kpi .value{font-size:18px}
  table{font-size:11px}th,td{padding:6px 7px}
  .bar-label{width:60px;font-size:10px}
  .vc ul{font-size:12px}
}
@media(max-width:480px){
  .main{padding:52px 6px 12px}
  .card{padding:14px}
  .kpi-row{grid-template-columns:1fr 1fr}
}
@media print{
  .sidebar,.hamburger,.overlay{display:none!important}
  .main{margin:0;padding:10px}
  .page{display:block!important;page-break-before:always}
  .page:first-child{page-break-before:auto}
}
</style>
</head>

// ── ROUTING ──
function showPage(id) {
  // Update nav
  document.querySelectorAll('#nav a').forEach(a => a.classList.toggle('active', a.dataset.page === id));
  // Close mobile nav
  sb.classList.remove('open'); ov.classList.remove('show');
  
  const mc = document.getElementById('mc');
  let html = '';
  
  if (BUILTIN[id]) {
    html = `<div class="page active">${BUILTIN[id]()}</div>`;
  } else if (MD[id]) {
    const pg = MD[id];
    const parentNav = findParentNav(id);
    let backBtn = '';
    if (parentNav) {
      backBtn = `<button class="back-btn" onclick="showPage('${parentNav.id}')">← Back to ${parentNav.title}</button>`;
    }
    html = `<div class="page active">${backBtn}<div class="stitle"><span class="ic">${pg.icon || '📄'}</span><h2>${pg.title}</h2></div><div class="card md-content">${pg.content}</div></div>`;
  } else {
    html = `<div class="page active"><div class="card"><h2>Page Not Found</h2><p>The page "${id}" is not available. Please select a page from the navigation.</p></div></div>`;
  }
  
  mc.innerHTML = html;
  window.scrollTo(0, 0);
  window.location.hash = id;
}

function findParentNav(id) {
  const item = NAV.find(n => n.id === id);
  if (!item || !item.parent) return null;
  // Find the section header or parent
  const idx = NAV.indexOf(item);
  for (let i = idx - 1; i >= 0; i--) {
    if (NAV[i].id) return NAV[i];
  }
  return null;
}

// ── EVENT LISTENERS ──
const sb = document.getElementById('sb');
const ov = document.getElementById('ov');
document.getElementById('ham').addEventListener('click', () => {
  sb.classList.toggle('open'); ov.classList.toggle('show');
});
ov.addEventListener('click', () => { sb.classList.remove('open'); ov.classList.remove('show'); });

navEl.addEventListener('click', e => {
  const a = e.target.closest('a');
  if (!a) return;
  e.preventDefault();
  showPage(a.dataset.page);
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { sb.classList.remove('open'); ov.classList.remove('show'); }
});

// Touch swipe to close
let touchX = 0;
sb.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
sb.addEventListener('touchend', e => {
  if (touchX - e.changedTouches[0].clientX > 50) { sb.classList.remove('open'); ov.classList.remove('show'); }
});

// Handle hash navigation
function handleHash() {
  const id = window.location.hash.slice(1) || 'dashboard';
  showPage(id);
}
window.addEventListener('hashchange', handleHash);

// Initial load — wait for MD data then render
(async () => {
  await loadMD();
  handleHash();
})();
</script>
